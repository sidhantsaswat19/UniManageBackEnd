spring.application.name=UniManageBackEnd

# Server Port Configuration
server.port=8080

# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# JPA / Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# HikariCP Connection Pool Settings for Cloud Databases
# Recycles connections every 9 minutes (before Aiven drops them)
spring.datasource.hikari.max-lifetime=540000
# Pings the database every 4 minutes to keep the connection alive
spring.datasource.hikari.keepalive-time=240000
# Validates the connection is still active before handing it to your code
spring.datasource.hikari.connection-test-query=SELECT 1